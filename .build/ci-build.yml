name: CI Build
trigger: none       # no trigger on push to any branch
# trigger: [main]   # push to main triggers build
pr: [ main ]        # pull request to main triggers build

variables:
  solution: '**/*.slnx'
  buildConfiguration: Debug

jobs:
- job: Build

  pool:
    vmImage: 'windows-latest'

  steps:

  # https://learn.microsoft.com/de-de/azure/devops/pipelines/tasks/reference/use-dotnet-v2
  # https://github.com/dotnet/core/blob/main/release-notes/releases-index.json
  - task: UseDotNet@2
    inputs:
      version: '10.x'  #lts
      packageType: runtime

  - task: DotNetCoreCLI@2
    displayName: Build
    inputs:
      command: 'build'
      projects: '**/*.slnx'
      arguments: '--configuration $(buildConfiguration)'

#  - task: DotNetCoreCLI@2
